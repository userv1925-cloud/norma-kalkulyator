<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Norma Hisoblagich</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        :root {
            --primary-color: #6366f1;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: var(--bg-gradient);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 380px;
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            margin-top: 0;
            color: #1a1a1a;
            font-weight: 900;
            font-size: 22px;
            text-transform: uppercase;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 15px;
            color: #333;
        }

        input {
            width: 100%;
            padding: 14px 15px;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary-color);
            background: #fefeff;
        }

        .result-box {
            background: #f0f4ff;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin-top: 25px;
            border: 3px solid var(--primary-color);
        }

        .result-title {
            font-size: 14px;
            color: #555;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .result-value {
            font-size: 38px;
            color: var(--primary-color);
            margin: 0;
            font-weight: 900;
        }

        .unit {
            font-size: 16px;
            color: #888;
            margin-left: 5px;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Norma Hisoblagich</h2>
    
    <div class="input-group">
        <label>Kunlik norma (dona):</label>
        <input type="number" id="daily" placeholder="Masalan: 5000" oninput="calc()">
    </div>

    <div class="input-group">
        <label>Ish vaqti (soat):</label>
        <input type="number" id="hours" placeholder="Masalan: 8" oninput="calc()">
    </div>

    <div class="result-box">
        <div class="result-title">Soatlik norma</div>
        <p class="result-value" id="res">0 <span class="unit">ta/s</span></p>
    </div>
</div>

<script>
    // Service Worker ro'yxatdan o'tkazish
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('SW tayyor!'))
                .catch(err => console.log('Xato!', err));
        });
    }

    function calc() {
        const daily = document.getElementById('daily').value;
        const hours = document.getElementById('hours').value;
        const res = document.getElementById('res');

        if (daily > 0 && hours > 0) {
            const val = (daily / hours).toFixed(1);
            res.innerHTML = val + ' <span class="unit">ta/s</span>';
        } else {
            res.innerHTML = '0 <span class="unit">ta/s</span>';
        }
    }
</script>

</body>
</html>
