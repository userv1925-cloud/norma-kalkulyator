<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Norma Kalkulyatori</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
    <style>
        :root {
            --primary-color: #6366f1;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: var(--bg-gradient);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold; /* Barcha matnlar qalin */
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 380px;
        }

        h2 {
            text-align: center;
            margin-top: 0;
            color: #1a1a1a;
            font-weight: 800;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #444;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            box-sizing: border-box;
            outline: none;
        }

        input:focus {
            border-color: var(--primary-color);
        }

        .result-box {
            background: #f8fafc;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin-top: 25px;
            border: 2px solid var(--primary-color);
        }

        .result-value {
            font-size: 36px;
            color: var(--primary-color);
            margin: 0;
        }

        .unit {
            font-size: 16px;
            color: #64748b;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Norma Hisoblagich</h2>
    
    <div class="input-group">
        <label>Kunlik norma (dona):</label>
        <input type="number" id="daily" placeholder="0" oninput="calc()">
    </div>

    <div class="input-group">
        <label>Ish vaqti (soat):</label>
        <input type="number" id="hours" placeholder="0" oninput="calc()">
    </div>

    <div class="result-box">
        <div style="margin-bottom: 5px;">Soatlik norma:</div>
        <p class="result-value" id="res">0 <span class="unit">ta/s</span></p>
    </div>
</div>

<script>
    // Service Worker ro'yxatdan o'tkazish
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }

    function calc() {
        const daily = document.getElementById('daily').value;
        const hours = document.getElementById('hours').value;
        const res = document.getElementById('res');

        if (daily > 0 && hours > 0) {
            const val = (daily / hours).toFixed(1);
            res.innerHTML = val + ' <span class="unit">ta/s</span>';
        } else {
            res.innerHTML = '0 <span class="unit">ta/s</span>';
        }
    }
</script>

</body>
</html>
